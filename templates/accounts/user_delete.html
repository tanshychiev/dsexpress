{% extends "base.html" %}
{% block content %}
<div style="max-width:700px;margin:24px auto;padding:0 12px;">
  <div style="background:#fff;border-radius:14px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.08);">
    <h2 style="margin:0;">Delete User</h2>
    <p style="color:#444;">Are you sure you want to delete <b>{{ u.username }}</b>?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" style="background:#ef4444;color:#fff;padding:10px 14px;border:0;border-radius:10px;font-weight:700;">
        Yes, Delete
      </button>
      <a href="{% url 'user_list' %}" style="background:#e5e7eb;color:#111;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700;">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
