{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}DS EXPRESS Computer Portal{% endblock %}</title>

  <link
    rel="icon"
    type="image/png"
    href="{% static 'img/ds-app-icon-192.png' %}"
  >

  <link
    rel="stylesheet"
    href="{% static 'customerportal/css/computer_portal.css' %}?v=20260619d"
  >

  {% block extra_css %}{% endblock %}
</head>

<body>
  <div class="computer-app">

    <aside class="computer-sidebar">
      <a
        href="{% url 'portal:computer_dashboard' %}"
        class="computer-brand"
      >
        <span class="computer-brand-logo">
          <img
            src="{% static 'img/ds-app-icon-192.png' %}"
            alt="DS Express"
          >
        </span>

        <span>
          <strong>DS EXPRESS</strong>
          <small>Computer Portal</small>
        </span>
      </a>

      <p class="computer-nav-heading">Main menu</p>

      <nav
        class="computer-nav"
        aria-label="Computer portal navigation"
      >
        <a
          href="{% url 'portal:computer_dashboard' %}"
          class="computer-nav-link {% block nav_dashboard %}{% endblock %}"
        >
          <svg viewBox="0 0 24 24">
            <path d="M3 10.5 12 3l9 7.5"></path>
            <path d="M5.5 9.5V21h13V9.5"></path>
            <path d="M9.5 21v-6h5v6"></path>
          </svg>
          <span>Dashboard</span>
        </a>

        <a
          href="{% url 'portal:computer_orders' %}"
          class="computer-nav-link {% block nav_orders %}{% endblock %}"
        >
          <svg viewBox="0 0 24 24">
            <path d="M4 5h16v14H4z"></path>
            <path d="M8 9h8M8 13h8M8 17h5"></path>
          </svg>
          <span>Orders</span>
        </a>

        <a
          href="{% url 'portal:computer_delivery_report' %}"
          class="computer-nav-link {% block nav_delivery_report %}{% endblock %}"
        >
          <svg viewBox="0 0 24 24">
            <path d="M4 20V10M10 20V4M16 20v-7M22 20V7M2 20h21"></path>
          </svg>
          <span>Delivery Report</span>
        </a>

        <a
          href="{% url 'portal:computer_cod_report' %}"
          class="computer-nav-link {% block nav_cod_report %}{% endblock %}"
        >
          <svg viewBox="0 0 24 24">
            <rect x="3" y="5" width="18" height="14" rx="3"></rect>
            <path d="M7 12h10M12 8v8"></path>
          </svg>
          <span>COD Report</span>
        </a>

        <a
          href="{% url 'portal:computer_inventory' %}"
          class="computer-nav-link {% block nav_inventory %}{% endblock %}"
        >
          <svg viewBox="0 0 24 24">
            <path d="M12 3 3.8 7.5 12 12l8.2-4.5z"></path>
            <path d="M3.8 7.5V16.5L12 21l8.2-4.5V7.5"></path>
            <path d="M12 12v9"></path>
          </svg>
          <span>Inventory</span>
        </a>
      </nav>

      <div class="computer-sidebar-bottom">
        <a
          href="{% url 'portal:dashboard' %}"
          class="computer-switch-link"
        >
          Open phone portal
        </a>

        <a
          href="{% url 'portal:logout' %}"
          class="computer-logout-link"
        >
          <svg viewBox="0 0 24 24">
            <path d="M10 4H4v16h6M14 8l4 4-4 4M8 12h10"></path>
          </svg>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <main class="computer-main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script
    src="{% static 'customerportal/js/computer_dashboard.js' %}?v=20260619d"
  ></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
