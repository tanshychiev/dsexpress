{% with current=request.resolver_match.url_name %}
<style>
  body{
    padding-bottom:calc(104px + env(safe-area-inset-bottom, 0px)) !important;
  }

  .ds-bottom-nav{
    position:fixed;
    left:50%;
    bottom:calc(12px + env(safe-area-inset-bottom, 0px));
    transform:translateX(-50%);
    width:min(430px, calc(100% - 22px));
    min-height:72px;
    z-index:9000;
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    align-items:center;
    gap:3px;
    padding:7px;
    border:1px solid rgba(15,122,69,.12);
    border-radius:25px;
    background:rgba(255,255,255,.96);
    box-shadow:
      0 16px 40px rgba(17,55,37,.18),
      inset 0 1px 0 rgba(255,255,255,.95);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
  }

  .ds-nav-link{
    min-width:0;
    min-height:56px;
    padding:4px 1px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    border-radius:18px;
    color:#66756d;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
    transition:
      transform .15s ease,
      color .15s ease,
      background .15s ease;
  }

  .ds-nav-link:active{
    transform:scale(.95);
  }

  .ds-nav-link.active{
    color:#087746;
    background:linear-gradient(145deg,#effbf5 0%,#e3f6ec 100%);
  }

  .ds-nav-icon{
    width:34px;
    height:34px;
    flex:0 0 34px;
    display:grid;
    place-items:center;
    border-radius:12px;
    background:#edf8f2;
    border:1px solid rgba(15,122,69,.11);
    color:#119b5e;
    box-shadow:0 5px 12px rgba(15,122,69,.08);
  }

  .ds-nav-link.active .ds-nav-icon{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(145deg,#0e9e5d 0%,#18bd75 100%);
    box-shadow:0 7px 15px rgba(15,157,93,.24);
  }

  .ds-nav-icon svg{
    width:20px;
    height:20px;
    display:block;
    fill:none;
    stroke:currentColor;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .ds-nav-label{
    width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:center;
    font-size:9px;
    line-height:1;
    font-weight:900;
  }

  @media (max-width:360px){
    .ds-bottom-nav{
      width:calc(100% - 16px);
      gap:2px;
      padding:6px;
    }

    .ds-nav-link{
      min-height:54px;
    }

    .ds-nav-icon{
      width:32px;
      height:32px;
      flex-basis:32px;
    }
  }
</style>

<nav class="ds-bottom-nav" aria-label="Seller portal navigation">
  <a
    href="{% url 'portal:dashboard' %}"
    class="ds-nav-link {% if current != 'change_password' %}active{% endif %}"
    {% if current != 'change_password' %}aria-current="page"{% endif %}
  >
    <span class="ds-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M3 10.5 12 3l9 7.5"></path>
        <path d="M5.5 9.5V21h13V9.5"></path>
        <path d="M9.5 21v-6h5v6"></path>
      </svg>
    </span>
    <span class="ds-nav-label">Home</span>
  </a>

  <a href="tel:011789955" class="ds-nav-link">
    <span class="ds-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M5.4 3.8 8 3l2 5-2.2 1.4a15 15 0 0 0 6.8 6.8L16 14l5 2-.8 2.6a3 3 0 0 1-3.4 2.1C9.4 19.2 4.8 14.6 3.3 7.2A3 3 0 0 1 5.4 3.8z"></path>
      </svg>
    </span>
    <span class="ds-nav-label">Contact</span>
  </a>

  <a
    href="https://t.me/DS_Express_Sale"
    target="_blank"
    rel="noopener noreferrer"
    class="ds-nav-link"
  >
    <span class="ds-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M21 11.5a8.5 8.5 0 0 1-9 8.5 9.2 9.2 0 0 1-4-.9L3 21l1.6-4.5A8.4 8.4 0 1 1 21 11.5z"></path>
        <path d="M9.6 9a2.5 2.5 0 0 1 4.8.9c0 1.8-2.4 2-2.4 3.5"></path>
        <path d="M12 16.8h.01"></path>
      </svg>
    </span>
    <span class="ds-nav-label">Help</span>
  </a>

  <a
    href="{% url 'portal:change_password' %}"
    class="ds-nav-link {% if current == 'change_password' %}active{% endif %}"
    {% if current == 'change_password' %}aria-current="page"{% endif %}
  >
    <span class="ds-nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4.5 21a7.5 7.5 0 0 1 15 0"></path>
      </svg>
    </span>
    <span class="ds-nav-label">Profile</span>
  </a>
</nav>
{% endwith %}
